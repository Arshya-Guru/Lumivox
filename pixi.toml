[workspace]
name ="Lumivox"
version = "0.1.0"
description = "Lightsheet / OME-Zarr / NGFF environment"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
# ---- core array stack ----
numpy = "*"
scipy = "*"
# ---- Zarr / NGFF ----
zarr = ">=3.0.8"
numcodecs = "*"
fsspec = ">=2026.2.0,<2027"
crc32c = "*"
donfig = "*"
# ---- image IO ----
tifffile = "*"
imageio = "*"
pillow = "*"
h5py = "*"
imagecodecs = "*"
# ---- big-volume tooling ----
dask = "*"
dask-image = "*"
xarray = "*"
pandas = ">=2.2,<3"
# ---- ML core (conda-forge) ----
scikit-learn = "*"
scikit-image = ">=0.19.3"
simpleitk = ">=2.2.1"
einops = "*"
loguru = "*"
seaborn = "*"
wandb = "*"
# ---- nnSSL (conda-forge) ----
graphviz = "*"
pytest = "*"
requests = "*"
deprecated = "*"
# ---- viz / napari ----
napari = ">=0.5.0,<0.6"
pyqt = "*"
qtpy = "*"
# ---- QoL ----
ipython = "*"
jupyterlab = "*"
tqdm = "*"
rich = "*"
ipykernel = ">=6.31.0,<7"
nibabel = ">=5.3.2,<6"
napari-ome-zarr = ">=0.6.1,<0.7"
s3fs = ">=2026.2.0,<2027"
aiohttp = ">=3.13.3,<4"
matplotlib = ">=3.10.8,<4"
xmltodict = ">=1.0.3,<2"
batchgenerators = ">=0.25.1,<0.26"
connected-components-3d = ">=3.26.1,<4"

[pypi-dependencies]
zarrnii = "==0.15.3a1"
# ---- ML core (PyPI-only) ----
pytorch-lightning = ">=2.0"
timm = "<=1.0.16"
torchio = "*"
pytorch-msssim = "*"
lpips = "*"
yacs = "*"
dicom2nifti = "*"
# ---- nnSSL (PyPI-only) ----
acvl-utils = ">=0.2"
dynamic-network-architectures = { git = "https://github.com/TaWald/dynamic-network-architectures", branch = "main" }
einops = ">=0.7"
blosc2 = ">=3.0.0b1"
pytest = ">=7.0"

[tasks]
python = "python"
napari = "napari"
lab = "jupyter lab"
notebook = "jupyter notebook"

# ---- Lumivox SSL tasks ----
smoke-simclr = "python -m lumivox.training.pretrain --method simclr --epochs 2 --batch-size 2 --crop-size 16 --num-workers 0 --precision 32"
smoke-nnbyol3d = "python -m lumivox.training.pretrain --method nnbyol3d --epochs 2 --batch-size 2 --crop-size 16 --num-workers 0 --precision 32"
smoke-legacy = "python -m lumivox.training.pretrain --method byol3d-legacy --epochs 2 --batch-size 2 --crop-size 16 --num-workers 0 --precision 32"
pretrain = "python -m lumivox.training.pretrain_lightning"
finetune = "python -m lumivox.training.finetune"
test = "python -m pytest tests/ -v"
manifest = "python -m lumivox.data.manifest"

# ─────────────────────────────────────────────
# Features
# ─────────────────────────────────────────────

[feature.gpu.pypi-dependencies]
torch = { version = ">=2.10.0,<3", index = "https://download.pytorch.org/whl/cu128" }

[feature.cpu.pypi-dependencies]
torch = { version = ">=2.10.0,<3", index = "https://download.pytorch.org/whl/cpu" }

# ─────────────────────────────────────────────
# Environments  (gpu is default / listed first)
# ─────────────────────────────────────────────

[environments]
default = { features = ["gpu"], solve-group = "gpu" }
gpu     = { features = ["gpu"], solve-group = "gpu" }
cpu     = { features = ["cpu"], solve-group = "cpu" }
